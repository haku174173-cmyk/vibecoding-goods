<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 완료 - VibeCoding 굿즈샵</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
</head>
<body>
<div class="result-wrap" id="result-wrap">
  <div class="spinner">결제를 확인하는 중...</div>
</div>

<script>
  (async () => {
    const sb = window.sbClient || window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const params = new URLSearchParams(location.search);
    const paymentKey = params.get("paymentKey");
    const orderId = params.get("orderId");
    const amount = Number(params.get("amount"));

    const wrap = document.getElementById("result-wrap");

    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/confirm-payment`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY },
        body: JSON.stringify({ paymentKey, orderId, amount }),
      });

      if (!res.ok) throw new Error("결제 확인 실패");

      wrap.innerHTML = `
        <div class="icon">✅</div>
        <h1>결제 완료!</h1>
        <p>주문이 성공적으로 처리되었습니다.<br>감사합니다!</p>
        <a href="my-orders.html" class="btn-link">내 결제내역 보기</a>
        <a href="products.html" class="btn-link secondary">쇼핑 계속하기</a>
      `;
    } catch (e) {
      wrap.innerHTML = `
        <div class="icon">⚠️</div>
        <h1>확인 중 오류</h1>
        <p>결제는 완료됐을 수 있습니다.<br>내 결제내역을 확인해주세요.</p>
        <a href="my-orders.html" class="btn-link">내 결제내역 보기</a>
      `;
    }
  })();
</script>
</body>
</html>
