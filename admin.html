<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 페이지 - VibeCoding 굿즈샵</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>
<header>
  <a class="logo" href="products.html">VibeCoding 굿즈샵</a>
  <nav id="nav"></nav>
</header>

<main>
  <h1>관리자 페이지</h1>

  <h2>상품 추가</h2>
  <div class="product-form">
    <div class="form-group">
      <label>상품명</label>
      <input type="text" id="p-name" placeholder="상품명">
    </div>
    <div class="form-group">
      <label>가격 (원)</label>
      <input type="number" id="p-price" placeholder="10000">
    </div>
    <div class="form-group full">
      <label>설명</label>
      <input type="text" id="p-desc" placeholder="상품 설명">
    </div>
    <div class="form-group">
      <label>이미지 URL</label>
      <input type="text" id="p-img" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>재고</label>
      <input type="number" id="p-stock" placeholder="100">
    </div>
    <div class="full">
      <button class="btn-submit" onclick="addProduct()" style="max-width:200px">상품 추가</button>
      <span id="product-msg" style="margin-left:12px;font-size:14px;color:#388e3c"></span>
    </div>
  </div>

  <h2>전체 주문 목록</h2>
  <div id="orders-section"><div class="spinner">불러오는 중...</div></div>

  <h2 style="margin-top:40px">상품 관리</h2>
  <div id="products-section"><div class="spinner">불러오는 중...</div></div>
</main>

<script>
  let adminSession = null;

  (async () => {
    try {
      adminSession = await requireAdmin();
      if (!adminSession) return;
      renderNav(adminSession, true);
      loadOrders();
      loadProducts();
    } catch (err) {
      document.getElementById("orders-section").innerHTML =
        '<div class="empty" style="color:#e53935">오류: ' + err.message + '</div>';
    }
  })();

  async function loadOrders() {
    const { data: orders } = await window.sbClient
      .from("orders")
      .select("*, order_items(quantity, price, products(name))")
      .order("created_at", { ascending: false });

    const el = document.getElementById("orders-section");
    if (!orders || orders.length === 0) { el.innerHTML = '<div class="empty">주문이 없습니다.</div>'; return; }

    const statusMap = { paid: "결제완료", pending: "결제대기", failed: "결제실패" };
    const badgeMap = { paid: "badge-paid", pending: "badge-pending", failed: "badge-failed" };

    el.innerHTML = `
      <table class="admin-table">
        <thead><tr><th>주문번호</th><th>일시</th><th>상품</th><th>금액</th><th>상태</th></tr></thead>
        <tbody>${orders.map(o => {
          const items = o.order_items?.map(i => `${i.products?.name} x${i.quantity}`).join(", ") || "";
          const date = new Date(o.created_at).toLocaleString("ko-KR");
          return `<tr>
            <td style="font-size:12px;color:#aaa">${o.id.slice(0, 8)}...</td>
            <td>${date}</td>
            <td>${items}</td>
            <td>${o.total_amount.toLocaleString()}원</td>
            <td><span class="badge ${badgeMap[o.status] || ''}">${statusMap[o.status] || o.status}</span></td>
          </tr>`;
        }).join("")}</tbody>
      </table>
    `;
  }

  async function loadProducts() {
    const { data: products } = await window.sbClient.from("products").select("*").order("id");
    const el = document.getElementById("products-section");
    if (!products || products.length === 0) { el.innerHTML = '<div class="empty">상품이 없습니다.</div>'; return; }

    el.innerHTML = `
      <table class="admin-table">
        <thead><tr><th>ID</th><th>상품명</th><th>가격</th><th>재고</th><th>관리</th></tr></thead>
        <tbody>${products.map(p => `
          <tr>
            <td>${p.id}</td>
            <td>${p.name}</td>
            <td>${p.price.toLocaleString()}원</td>
            <td>${p.stock}</td>
            <td><button class="btn-small btn-danger" onclick="deleteProduct(${p.id})">삭제</button></td>
          </tr>
        `).join("")}</tbody>
      </table>
    `;
  }

  async function addProduct() {
    const name = document.getElementById("p-name").value.trim();
    const price = parseInt(document.getElementById("p-price").value);
    const description = document.getElementById("p-desc").value.trim();
    const image_url = document.getElementById("p-img").value.trim();
    const stock = parseInt(document.getElementById("p-stock").value) || 100;

    const msg = document.getElementById("product-msg");
    if (!name || !price) { msg.style.color = "#e53935"; msg.textContent = "상품명과 가격은 필수입니다."; return; }

    const { error } = await window.sbClient.from("products").insert({ name, price, description, image_url, stock });
    if (error) { msg.style.color = "#e53935"; msg.textContent = "추가 실패: " + error.message; return; }

    msg.style.color = "#388e3c";
    msg.textContent = "상품이 추가되었습니다!";
    ["p-name","p-price","p-desc","p-img","p-stock"].forEach(id => document.getElementById(id).value = "");
    loadProducts();
  }

  async function deleteProduct(id) {
    if (!confirm("정말 삭제하시겠습니까?")) return;
    const { error } = await window.sbClient.from("products").delete().eq("id", id);
    if (error) { alert("삭제 실패: " + error.message); return; }
    loadProducts();
  }
</script>
</body>
</html>
